server:
  port: 8006

spring:
  cloud:
    compatibility-verifier:
      enabled: false
  datasource:
    druid:
      url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/gmp_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      username: ${DB_USER:root}
      password: ${DB_PASS:root}
      driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:123456}
      database: 4

# MinIO对象存储配置
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:admin}
  secret-key: ${MINIO_SECRET_KEY:12345678}
  default-bucket: gmp-files
  secure: false
  multipart-threshold: 10485760    # 10MB以上分片上传
  multipart-size: 5242880          # 每片5MB

# 文件上传限制
spring.servlet.multipart:
  max-file-size: 500MB
  max-request-size: 500MB

mybatis-plus:
  type-aliases-package: com.gmp.file.entity
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.gmp.file: DEBUG
