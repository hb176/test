# ==========================================
# GMP网关服务配置
# ==========================================
server:
  port: 8000
  # Netty服务器配置（Gateway基于Netty）
  netty:
    connection-timeout: 30000  # 连接超时(ms)

spring:
  application:
    name: gmp-gateway
  main:
    web-application-type: reactive

  # Redis配置（用于限流计数和Token黑名单）
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:123456}
      database: 1
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  # Nacos配置
  cloud:
    compatibility-verifier:
      enabled: false
    nacos:
      config:
        server-addr: ${NACOS_SERVER:localhost:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        enabled: false
      discovery:
        server-addr: ${NACOS_SERVER:localhost:8848}
        group: GMP_GROUP
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}

    # 网关路由配置
    gateway:
      # 全局跨域配置
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: "*"
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowed-headers: "*"
            max-age: 3600
      # 默认过滤器（应用于所有路由）
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin

# 日志配置
logging:
  level:
    com.gmp.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
